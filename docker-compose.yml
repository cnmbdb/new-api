services:
  overlay-proxy:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./overlay/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - new-api

  new-api:
    image: calciumion/new-api:latest
    restart: always
    command: --log-dir /app/logs
    env_file:
      - .env

volumes:
  {} # placeholder
