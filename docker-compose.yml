services:
  new-api:
    image: calciumion/new-api:latest
    restart: always
    command: --log-dir /app/logs
    env_file:
      - .env

  overlay-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3002"
    depends_on:
      - new-api
    env_file:
      - .env
