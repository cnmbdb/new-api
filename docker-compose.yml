services:
  overlay-proxy:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./overlay/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - new-api

  new-api:
    image: calciumion/new-api:latest
    restart: always
    command: --log-dir /app/logs
    env_file:
      - .env
    environment:
      - SQL_DSN=${SQL_DSN:-postgresql://root:${POSTGRES_PASSWORD}@postgres:5432/new-api}
      - REDIS_CONN_STRING=${REDIS_CONN_STRING:-redis://:${REDIS_PASSWORD}@redis:6379}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  redis:
    image: redis:latest
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-123456}"]
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-123456}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
      POSTGRES_DB: new-api
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d new-api"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pg_data:
