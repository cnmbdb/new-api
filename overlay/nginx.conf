events {}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  map $request_uri $inject_head {
    default '<style>img[src="/logo.png"],img[alt="logo"],img[alt="徽标"]{display:none!important}</style>';
  }

  map $request_uri $inject_body {
    default '<script>setTimeout(function h(){document.querySelectorAll("h1,span,a,p,div").forEach(function(e){if(e.childNodes.length===1&&e.childNodes[0].nodeType===3){var t=e.textContent.trim();if(t==="New API"){e.style.visibility="hidden";e.style.fontSize="0";e.style.overflow="hidden";e.style.position="absolute";e.style.pointerEvents="none"}if(t.indexOf("©")!==-1&&t.indexOf("版权所有")!==-1){var d=e.closest(".mx-auto.max-w-6xl");if(!d||!d.querySelector("a[href]")){e.style.display="none"}}}})},400)</script>';
  }

  server {
    listen 3002;
    server_name _;

    location /__overlay-status {
      default_type text/plain;
      return 200 "overlay active\n";
    }

    location / {
      proxy_pass http://192.168.65.254:3001;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_set_header Accept-Encoding "";

      sub_filter_once off;
      sub_filter '</head>' '</head>$inject_head';
      sub_filter '</body>' '$inject_body</body>';
    }
  }
}
