events {}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  map $request_uri $inject_head {
    default '<style>img[src="/logo.png"],img[alt="logo"],img[alt="徽标"]{display:none!important}</style>';
  }

  map $request_uri $inject_body {
    default '<script>setTimeout(function h(){document.querySelectorAll("p,span").forEach(function(e){var t=e.textContent||"";if(t.indexOf("©")!==-1&&t.indexOf("版权所有")!==-1)e.style.display="none";if(e.textContent.trim()==="首页"){e.style.cursor="pointer"}});document.querySelectorAll("a,span").forEach(function(e){var t=e.textContent||"";var h=e.getAttribute("href")||"";if(t.trim()==="主页"&&h==="/")e.setAttribute("href","http://localhost:5678/");if(t.trim()==="首页"){e.onclick=function(){window.location.href="https://tokenapi.txsw.top/"};e.style.cursor="pointer"}})},600)</script>';
  }

  server {
    listen 3002;
    server_name _;

    location /__overlay-status {
      default_type text/plain;
      return 200 "overlay active\n";
    }

    location / {
      proxy_pass http://new-api:3000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_set_header Accept-Encoding "";

      sub_filter_once off;
      sub_filter '</head>' '</head>$inject_head';
      sub_filter '</body>' '$inject_body</body>';
    }
  }
}
